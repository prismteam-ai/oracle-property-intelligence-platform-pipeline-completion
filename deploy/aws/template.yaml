AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Oracle Property Intelligence — UI + elephant-mcp on ECS Fargate, artifacts in S3.
  No RDS. DuckDB reads parquet from local container disk (fetched from S3 at startup).

Parameters:
  ProjectName:
    Type: String
    Default: oracle-property-intelligence
  UiImageUri:
    Type: String
    Description: ECR image URI for the Flask UI (e.g. 123.dkr.ecr.us-east-1.amazonaws.com/oracle-ui:latest)
  McpImageUri:
    Type: String
    Description: ECR image URI for elephant-mcp (e.g. 123.dkr.ecr.us-east-1.amazonaws.com/oracle-mcp:latest)
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 2

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB ingress
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  UiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /
      VpcId: !Ref AppVpc

  McpTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /mcp
      Matcher:
        HttpCode: 200-499
      VpcId: !Ref AppVpc

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref UiTargetGroup

  McpListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - "/mcp*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref McpTargetGroup

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadArtifacts
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

  UiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-ui"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: ui
          Image: !Ref UiImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: WEB_PORT
              Value: "3000"
            - Name: PARQUET_S3_URI
              Value: !Sub "s3://${ArtifactBucket}/artifacts/properties.parquet"
            - Name: RUN_SUMMARY_S3_URI
              Value: !Sub "s3://${ArtifactBucket}/artifacts/run_summary.json"
            - Name: MANIFEST_S3_URI
              Value: !Sub "s3://${ArtifactBucket}/artifacts/manifest.json"
            - Name: MCP_BASE_URL
              Value: !Sub "http://${Alb.DNSName}/mcp"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref UiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ui

  McpTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-mcp"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: mcp
          Image: !Ref McpImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: MCP_PORT
              Value: "8000"
            - Name: COUNTY
              Value: santa-clara
            - Name: PARQUET_S3_URI
              Value: !Sub "s3://${ArtifactBucket}/artifacts/properties.parquet"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref McpLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: mcp

  UiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}/ui"
      RetentionInDays: 14

  McpLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}/mcp"
      RetentionInDays: 14

  UiService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: !Sub "${ProjectName}-ui"
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref UiTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
      LoadBalancers:
        - ContainerName: ui
          ContainerPort: 3000
          TargetGroupArn: !Ref UiTargetGroup

  McpService:
    Type: AWS::ECS::Service
    DependsOn: McpListenerRule
    Properties:
      ServiceName: !Sub "${ProjectName}-mcp"
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref McpTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
      LoadBalancers:
        - ContainerName: mcp
          ContainerPort: 8000
          TargetGroupArn: !Ref McpTargetGroup

  AppVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AppVpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.42.1.0/24
      MapPublicIpOnLaunch: true

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AppVpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.42.2.0/24
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AppVpc
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AppVpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

Outputs:
  LoadBalancerUrl:
    Description: Public UI URL
    Value: !Sub "http://${Alb.DNSName}"
  McpUrl:
    Description: Public MCP endpoint
    Value: !Sub "http://${Alb.DNSName}/mcp"
  ArtifactBucketName:
    Description: S3 bucket for parquet and manifest
    Value: !Ref ArtifactBucket
  RunSummaryPath:
    Value: !Sub "s3://${ArtifactBucket}/artifacts/run_summary.json"
