name: PROD CI/CD
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  prod:
    uses: Spring-Oaks-Capital-LLC/github-workflows/.github/workflows/ci-cd-prod.yml@main
    with:
      env-vars: |
        TARGET_ENV=prod
        CDK_BOOTSTRAP_QUALIFIER=slowking
    permissions:
      id-token: write
      contents: read
