<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chat — Oracle Property Intel</title>
<link rel="stylesheet" href="/app.css">
<style>
  .wrap { max-width:920px; margin:0; padding:0; display:flex; flex-direction:column;
          height:calc(100vh - 64px); }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:14px; }
  #log { flex:1; overflow-y:auto; padding:6px 2px; }
  .msg { margin:10px 0; display:flex; }
  .msg.user { justify-content:flex-end; }
  .bubble { max-width:85%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.45; }
  .user .bubble { background:var(--accent); color:#fff; }
  .bot .bubble { background:var(--card); border:1px solid var(--border); }
  .basis { color:var(--dim); font-size:12px; margin-top:6px; }
  details { margin-top:8px; font-size:12px; }
  summary { cursor:pointer; color:var(--dim); }
  pre { background:#0d1117; border:1px solid var(--border); border-radius:6px; padding:8px;
        overflow-x:auto; font-size:11px; }
  .tw { overflow-x:auto; margin-top:8px; border:1px solid var(--border); border-radius:8px; }
  table { border-collapse:collapse; width:100%; font-size:11px; }
  th, td { padding:4px 8px; border-bottom:1px solid var(--border); text-align:left;
           white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis; }
  th { background:#1c2129; color:var(--dim); }
  form { display:flex; gap:10px; padding:14px 0; }
  input { flex:1; background:var(--card); border:1px solid var(--border); color:var(--fg);
          border-radius:8px; padding:12px 14px; font-size:14px; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px;
           padding:0 24px; font-size:14px; cursor:pointer; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .chips button { background:var(--card); border:1px solid var(--border); color:var(--dim);
                  font-size:12px; padding:6px 10px; border-radius:14px; }
</style>
</head>
<body>
<script src="/common.js"></script>
<script>sidebar('chat');</script>
<div class="main">
<div class="wrap">
  <h1>Property Intelligence Agent</h1>
  <div class="sub">Answers from the DuckDB layer over IPFS-pinned Santa Clara County data.</div>
  <div class="chips" id="chips"></div>
  <div id="log"></div>
  <form id="f">
    <input id="q" placeholder="Ask about roofs, ownership, water views, transit, Starbucks… or paste SQL" autocomplete="off">
    <button>Send</button>
  </form>
</div>
</div>
<script>
const EXAMPLES = [
  "Which properties have roofs older than 15 years?",
  "Show properties with a view of water",
  "Which properties have not exchanged ownership in more than 10 years?",
  "Show properties with regional owners",
  "Properties within walking distance of public transportation",
  "Properties within walking distance of Starbucks",
  "Which properties have roofs older than 15 years and have not exchanged ownership in more than 10 years?",
  "Which properties are strong candidates for further review?",
];
const chips = document.getElementById("chips");
for (const e of EXAMPLES) {
  const b = document.createElement("button");
  b.type = "button"; b.textContent = e.length > 46 ? e.slice(0,44)+"…" : e;
  b.title = e;
  b.onclick = () => { document.getElementById("q").value = e; send(); };
  chips.appendChild(b);
}
const log = document.getElementById("log");

function bubble(cls, html) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = `<div class="bubble">${html}</div>`;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

async function send() {
  const q = document.getElementById("q");
  const text = q.value.trim();
  if (!text) return;
  q.value = "";
  bubble("user", esc(text));
  const thinking = bubble("bot", "<span style='color:var(--dim)'>querying DuckDB…</span>");
  try {
    const r = await (await fetch("/api/chat", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: text})})).json();
    let html = "";
    if (r.error) {
      html = `<span style="color:var(--err)">${esc(r.error)}</span>`;
    } else {
      const n = (r.rows||[]).length;
      html = n ? `<strong>${n} result${n===1?"":"s"}</strong>` : "<strong>No matching records.</strong>";
      if (r.narrative) html = `<div>${esc(r.narrative)}</div><div style="margin-top:8px">${html}</div>`;
      if (r.basis) html += `<div class="basis">${esc(r.basis)}</div>`;
      if (n) {
        html += `<div class="tw"><table><thead><tr>` +
          r.columns.map(c=>`<th>${esc(c)}</th>`).join("") + `</tr></thead><tbody>` +
          r.rows.map(row=>"<tr>"+row.map(v=>`<td title="${esc(v)}">${esc(v)}</td>`).join("")+"</tr>").join("") +
          `</tbody></table></div>`;
      }
      if (r.sql) html += `<details><summary>SQL</summary><pre>${esc(r.sql)}</pre></details>`;
    }
    thinking.querySelector(".bubble").innerHTML = html;
  } catch (e) {
    thinking.querySelector(".bubble").innerHTML = `<span style="color:var(--err)">${esc(e.message)}</span>`;
  }
  log.scrollTop = log.scrollHeight;
}
document.getElementById("f").onsubmit = e => { e.preventDefault(); send(); };
bubble("bot", "Hi — ask me property intelligence questions about Santa Clara County. Try a suggestion above, or paste raw SQL.");
</script>
</body>
</html>
